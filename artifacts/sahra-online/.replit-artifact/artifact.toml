kind = "web"
previewPath = "/"
title = "Sahra Online"
version = "1.0.0"
id = "artifacts/sahra-online"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26154

[services.development]
run = "pnpm --filter @workspace/sahra-online run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sahra-online", "run", "build" ]
publicDir = "artifacts/sahra-online/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26154"
BASE_PATH = "/"
